<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Coffee Wala | LPU Menu</title>
    <style>
        /* CSS STYLING */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', Times, serif; }
        body { background-color: #fdf5e6; color: #3e2723; }

        /* Header & Navigation */
        header { 
            background: #3e2723; color: white; padding: 15px; 
            text-align: center; position: sticky; top: 0; z-index: 100;
        }

        #home-page {
            height: 60vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2070');
            background-size: cover; color: white;
        }

        .btn-view {
            padding: 12px 30px; font-size: 18px; background: #d2691e;
            color: white; border: none; cursor: pointer; border-radius: 25px;
        }

        /* Menu Grid */
        #menu-page { display: none; padding: 40px 20px; padding-bottom: 100px; }
        .category-title { border-left: 5px solid #d2691e; padding-left: 10px; margin: 30px 0 15px; }
        
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .dish-card {
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;
        }

        .dish-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 5px; }
        .price-tag { font-weight: bold; color: #d2691e; margin: 8px 0; }
        
        .controls input { width: 50px; text-align: center; margin-left: 10px; }

        /* Footer Cart Bar */
        .order-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #3e2723; padding: 15px; text-align: center; display: flex;
            justify-content: space-around; align-items: center; color: white;
        }

        /* Modal */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 450px; color: #333; max-height: 80vh; overflow-y: auto; }
    </style>
</head>

    <section id="home-page">

    <section id="menu-page">

        function renderMenu() {
            const container = document.getElementById('menu-container');
            let currentCat = "";
            let html = "";

            inventory.forEach(item => {
                if (item.cat !== currentCat) {
                    currentCat = item.cat;
                    html += `<h3 class="category-title">${currentCat}</h3><div class="menu-grid">`;
                }
                html += `
                    <div class="dish-card">
                        <img src="${item.img}" alt="${item.name}">
                        <h4>${item.name}</h4>
                        <p class="price-tag">₹${item.price}</p>
                        <div class="controls">
                            Qty: <input type="number" id="qty-${item.id}" value="0" min="0" max="5" onchange="updateLiveTotal()">
                        </div>
                    </div>`;
                if (inventory.indexOf(item) === inventory.length - 1 || inventory[inventory.indexOf(item)+1].cat !== currentCat) {
                    html += `</div>`;
                }
            });
            container.innerHTML = html;
        }

        function showMenu() {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            renderMenu();
        }

        function updateLiveTotal() {
            let total = 0;
            inventory.forEach(item => {
                const qty = parseInt(document.getElementById(`qty-${item.id}`).value);
                total += qty * item.price;
            });
            document.getElementById('live-grand-total').innerText = `₹${total}`;
        }

        function openOrderPopup() {
            const cartList = document.getElementById('cart-items');
            cartList.innerHTML = '';
            let total = 0;
            let count = 0;

            inventory.forEach(item => {
                const qty = parseInt(document.getElementById(`qty-${item.id}`).value);
                if (qty > 0) {
                    const cost = qty * item.price;
                    total += cost;
                    count++;
                    cartList.innerHTML += `<p>${item.name} x ${qty} = ₹${cost}</p>`;
                }
            });

            if (count === 0) {
                alert("Empty cart! Order not placed.");
                return;
            }

            document.getElementById('modal-total').innerText = `Grand Total: ₹${total}`;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closePopup() { document.getElementById('modal-overlay').style.display = 'none'; }

        function placeFinalOrder() {
            alert("Order placed successfully at Apna Coffee Wala!");
            closePopup();
            location.reload(); 
        }
    </script>
